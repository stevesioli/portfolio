name: Deploy to GitHub Pages

# Example CI/CD workflow deploying the built site to GitHub Pages.
# Disabled by default (workflow_dispatch only) — enable the `push`
# trigger below once you've decided GitHub Pages is where this lives.
# For a *project* page (username.github.io/repo-name/), VITE_BASE_PATH
# must be set to "/repo-name/" so the build's asset and remote-entry
# URLs resolve correctly.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # Replace REPO_NAME if deploying to a project page.
          VITE_BASE_PATH: /REPO_NAME/
        run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/shell/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
